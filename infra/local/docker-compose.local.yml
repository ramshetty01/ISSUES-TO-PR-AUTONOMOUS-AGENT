# ---------------------------------------------------------------------------
# $0 local backbone: LocalStack (SQS + DynamoDB + S3), Postgres, and
# self-hosted Langfuse. Boots the whole free-tier runtime with one command.
#
# Endpoints are pinned to match packages/config/src/defaults.ts:
#   AWS_ENDPOINT_URL   http://localhost:4566   (SQS + DynamoDB + S3)
#   LANGFUSE_HOST      http://localhost:3000
#
# Bring up on its own:  docker compose -f infra/local/docker-compose.local.yml up -d
# Or via the root compose / Makefile for the full stack.
# ---------------------------------------------------------------------------

name: itpr-local

services:
  localstack:
    image: localstack/localstack:latest
    container_name: itpr-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,dynamodb,s3
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      DEBUG: "0"
    volumes:
      # Provision queues / table / bucket on boot (init hooks run from ready.d).
      - ./localstack-init.sh:/etc/localstack/init/ready.d/localstack-init.sh:ro
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs get-queue-url --queue-name itpr-jobs >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - itpr-local

  postgres:
    image: postgres:16-alpine
    container_name: itpr-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: langfuse
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - itpr-local

  langfuse:
    image: langfuse/langfuse:latest
    container_name: itpr-langfuse
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      # Dev-only secrets — override in .env for anything shared.
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-local-dev-nextauth-secret-change-me}
      SALT: ${LANGFUSE_SALT:-local-dev-salt-change-me}
      TELEMETRY_ENABLED: ${LANGFUSE_TELEMETRY_ENABLED:-false}
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - itpr-local

volumes:
  localstack-data:
  postgres-data:

networks:
  itpr-local:
    name: itpr-local
