name: test-python-worker

# Lint + type-check + test the Python worker package.
on:
  workflow_call:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/test-python-worker.yml"
  pull_request:
    paths:
      - "worker/**"
      - ".github/workflows/test-python-worker.yml"

jobs:
  test-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install worker (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (type-check)
        run: mypy src
        continue-on-error: true

      - name: Pytest
        run: pytest -q
