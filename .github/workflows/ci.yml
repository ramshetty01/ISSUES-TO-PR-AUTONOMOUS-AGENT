name: ci

# Umbrella CI: on every PR and push to main, fan out to the language- and
# artifact-specific workflows, then gate a single "ci-passed" status on all of
# them. Branch protection should require the "ci-passed" check.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript
    uses: ./.github/workflows/test-typescript.yml

  python-worker:
    name: Python worker
    uses: ./.github/workflows/test-python-worker.yml

  worker-image:
    name: Worker image
    uses: ./.github/workflows/build-worker-image.yml

  eval-smoke:
    name: Mock eval (zero-token)
    uses: ./.github/workflows/eval-internal.yml

  ci-passed:
    name: ci-passed
    runs-on: ubuntu-latest
    needs: [typescript, python-worker, worker-image, eval-smoke]
    if: always()
    steps:
      - name: Fail if any required job failed
        run: |
          results='${{ needs.typescript.result }} ${{ needs.python-worker.result }} ${{ needs.worker-image.result }} ${{ needs.eval-smoke.result }}'
          echo "job results: ${results}"
          for r in ${results}; do
            if [ "${r}" != "success" ]; then
              echo "::error::a required CI job did not succeed (${r})"
              exit 1
            fi
          done
          echo "all required CI jobs passed"
