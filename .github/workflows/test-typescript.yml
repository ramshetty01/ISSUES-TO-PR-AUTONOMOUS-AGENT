name: test-typescript

# Build + test every TypeScript workspace package/app. Callable on its own or
# as a reusable workflow from ci.yml.
on:
  workflow_call:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "apps/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/test-typescript.yml"
  pull_request:
    paths:
      - "packages/**"
      - "apps/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/test-typescript.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all workspaces
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test all workspaces
        run: pnpm -r test
