name: release

# Tag-triggered release. Re-runs the full test matrix, builds + publishes the
# worker image to GHCR, and drafts a GitHub Release with the changelog.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  verify:
    name: Verify before release
    uses: ./.github/workflows/test-typescript.yml

  verify-worker:
    name: Verify worker before release
    uses: ./.github/workflows/test-python-worker.yml

  publish-image:
    name: Publish worker image
    runs-on: ubuntu-latest
    needs: [verify, verify-worker]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/worker:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/worker:latest

  release:
    name: Draft GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-image]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
